<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>因子小侦探：水果分拣大挑战</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="panel">
      <h1>因子小侦探：水果分拣大挑战</h1>
      <p class="subtitle">目标：把水果按“颜色 + 大小 + 纹理”三个因子拆分，学会细粒度特征。</p>
    </header>

    <section class="panel controls">
      <button id="newBtn">新一关</button>
      <button id="checkBtn">检查答案</button>
      <button id="hintBtn">给我提示</button>
      <label>
        难度
        <select id="levelSel">
          <option value="easy">简单（6个水果）</option>
          <option value="normal" selected>普通（9个水果）</option>
          <option value="hard">困难（12个水果）</option>
        </select>
      </label>
    </section>

    <section class="panel stats">
      <div>关卡：<strong id="round">1</strong></div>
      <div>得分：<strong id="score">0</strong></div>
      <div>连续全对：<strong id="streak">0</strong></div>
      <div>本关正确率：<strong id="acc">-</strong></div>
    </section>

    <section class="panel boardWrap">
      <div class="bins">
        <h2>分拣箱（按“颜色+大小+纹理”）</h2>
        <div class="binRow" id="binRow"></div>
      </div>

      <div class="pool">
        <h2>待分拣水果</h2>
        <div id="pool"></div>
      </div>
    </section>

    <section class="panel">
      <h2>学习卡：什么是因子拆分？</h2>
      <ul>
        <li><strong>因子</strong>：描述事物的维度，比如颜色、大小、纹理。</li>
        <li><strong>细粒度特征</strong>：不是只看“像不像苹果”，而是看更细的小特征。</li>
        <li><strong>拆分方法</strong>：先看颜色，再看大小，最后看纹理，减少混淆。</li>
      </ul>
      <pre id="log" class="log">欢迎！先点“新一关”，把水果拖到对应分拣箱。</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
