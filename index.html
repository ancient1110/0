<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>因子小侦探：细菌分拣实验室</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="protocolWarn" class="panel protocolWarn" hidden>
      检测到你正在用 <code>file://</code> 直接打开页面。请改用本地 HTTP 服务（例如
      <code>python3 -m http.server 4173</code>）并通过
      <code>http://localhost:4173</code> 访问，避免浏览器的本地文件同源安全限制。
    </section>

    <header class="panel">
      <h1>因子小侦探：细菌分拣实验室</h1>
      <p class="subtitle">目标：细菌会在上方大区域里自由移动和旋转，选中后投放到下方空培养皿分区。</p>
    </header>

    <section class="panel controls">
      <div class="difficultyBar" id="difficultyBar">
        <span>难度：</span>
        <button class="diffBtn" data-level="easy">简单</button>
        <button class="diffBtn active" data-level="normal">普通</button>
        <button class="diffBtn" data-level="hard">困难</button>
        <button class="diffBtn" data-level="expert">专家</button>
      </div>
      <button id="refreshBtn">刷新样本</button>
      <button id="checkBtn">检查答案</button>
    </section>

    <section class="panel stats">
      <div>当前难度：<strong id="currentLevel">普通</strong></div>
      <div>得分：<strong id="score">0</strong></div>
      <div>本次正确率：<strong id="acc">-</strong></div>
    </section>

    <section class="panel boardWrap">
      <div class="arenaWrap">
        <h2>主界面混合样本（约半屏，无分割，自由移动）</h2>
        <div id="perfectBanner" class="perfectOverlay" hidden>
          ✅ 全域校验完成！已排除全部隐患，实验舱状态：绝对纯净。
        </div>
        <div id="arena"></div>
      </div>

      <div class="bins">
        <h2>下方培养皿分区（无标签）</h2>
        <div class="binRow" id="binRow"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
