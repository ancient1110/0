<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聚类训练营：K-Means 小游戏</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>聚类训练营：K-Means 小游戏</h1>
      <p class="subtitle">拖动质心、分配样本、迭代更新，直观理解聚类。</p>
    </header>

    <section class="panel controls">
      <button id="newRoundBtn">新一局</button>
      <button id="assignBtn">1) 分配到最近质心</button>
      <button id="updateBtn">2) 更新质心（取均值）</button>
      <button id="toggleTruthBtn">显示/隐藏真实簇</button>
      <label>
        难度
        <select id="difficulty">
          <option value="easy">简单（2簇，12点）</option>
          <option value="normal" selected>普通（3簇，18点）</option>
          <option value="hard">困难（4簇，28点）</option>
        </select>
      </label>
    </section>

    <section class="panel stats">
      <div>回合：<strong id="roundLabel">1</strong></div>
      <div>惯性(Inertia)：<strong id="inertiaLabel">-</strong></div>
      <div>轮廓得分近似：<strong id="qualityLabel">-</strong></div>
      <div>与真实簇匹配率：<strong id="accuracyLabel">-</strong></div>
    </section>

    <section class="panel">
      <canvas id="board" width="860" height="520" aria-label="聚类画布"></canvas>
      <p class="hint">操作：先拖动彩色质心到你认为合适的位置，再点“分配→更新”循环。目标是让惯性持续下降。</p>
    </section>

    <section class="panel">
      <h2>你学到了什么？</h2>
      <ul>
        <li><strong>分配步骤</strong>：每个样本归到最近质心。</li>
        <li><strong>更新步骤</strong>：质心移动到该簇样本的均值位置。</li>
        <li><strong>收敛现象</strong>：多轮后质心移动距离会变小，目标函数（惯性）降低。</li>
      </ul>
      <pre id="log" class="log">欢迎来到聚类训练营！先点“新一局”，然后拖动质心开始。</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
